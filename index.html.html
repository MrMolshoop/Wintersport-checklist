<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Wintersport ❄</title>
<meta name="description" content="Wintersport paklijst checklist">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wintersport">
<meta name="theme-color" content="#0a0f1e">
<link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22Wintersport%20Checklist%22%2C%22short_name%22%3A%22Wintersport%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230a0f1e%22%2C%22theme_color%22%3A%22%230a0f1e%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%253D%2527http%253A%252F%252Fwww.w3.org%252F2000%252Fsvg%2527%2520viewBox%253D%25270%25200%2520100%2520100%2527%253E%253Ctext%2520y%253D%2527.9em%2527%2520font-size%253D%252790%2527%253E%25E2%259D%2584%253C%252Ftext%253E%253C%252Fsvg%253E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0f1e'/><text y='.9em' font-size='75' x='10'>❄</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --card: #1a2235;
    --accent: #4fc3f7;
    --accent2: #e1f5fe;
    --snow: #e8f4fd;
    --text: #d0e8f5;
    --muted: #607d8b;
    --check: #00e5ff;
    --border: rgba(79,195,247,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
    padding-bottom: calc(4rem + env(safe-area-inset-bottom));
    background-image: 
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(79,195,247,0.12) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%234fc3f7' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  header {
    text-align: center;
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 8vw, 6rem);
    letter-spacing: 0.08em;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, #80deea 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 0.5rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .progress-bar-wrap {
    max-width: 400px;
    margin: 1.5rem auto 0;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
    letter-spacing: 0.05em;
  }

  .progress-bar {
    height: 4px;
    background: rgba(79,195,247,0.15);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #80deea);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .category {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .category:hover {
    border-color: rgba(79,195,247,0.3);
  }

  .cat-header {
    padding: 1rem 1.25rem;
    background: linear-gradient(135deg, rgba(79,195,247,0.08), transparent);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .cat-icon {
    font-size: 1.4rem;
    width: 2rem;
    text-align: center;
  }

  .cat-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.1em;
    color: var(--accent2);
  }

  .cat-count {
    margin-left: auto;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .items {
    padding: 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.5rem 0.75rem;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }

  .item:hover {
    background: rgba(79,195,247,0.06);
  }

  .item input[type="checkbox"] {
    display: none;
  }

  .check-box {
    width: 18px;
    height: 18px;
    min-width: 18px;
    border: 1.5px solid var(--muted);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .item.checked .check-box {
    background: var(--check);
    border-color: var(--check);
  }

  .check-icon {
    width: 10px;
    height: 10px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .item.checked .check-icon {
    opacity: 1;
  }

  .item-label {
    font-size: 0.875rem;
    font-weight: 300;
    line-height: 1.3;
    transition: color 0.2s;
    color: var(--text);
  }

  .item.checked .item-label {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: rgba(96,125,139,0.5);
  }

  .reset-btn {
    display: block;
    margin: 2.5rem auto 0;
    padding: 0.75rem 2rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover {
    border-color: rgba(79,195,247,0.4);
    color: var(--accent);
  }

  #install-banner {
    display: none;
    position: fixed;
    bottom: 1rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.9rem 1.2rem;
    gap: 0.8rem;
    align-items: center;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    max-width: 340px;
    width: calc(100% - 2rem);
  }

  #install-banner span {
    font-size: 0.85rem;
    color: var(--text);
    flex: 1;
  }

  #install-btn {
    background: var(--accent);
    color: #0a0f1e;
    border: none;
    border-radius: 7px;
    padding: 0.45rem 1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }

  #install-dismiss {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.1rem;
    cursor: pointer;
    line-height: 1;
    padding: 0 0.2rem;
  }

  #ios-tip {
    display: none;
    position: fixed;
    bottom: 1rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.2rem;
    flex-direction: column;
    gap: 0.4rem;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    max-width: 300px;
    width: calc(100% - 2rem);
  }

  #ios-tip p {
    font-size: 0.82rem;
    color: var(--text);
    line-height: 1.5;
  }

  #ios-tip p strong { color: var(--accent); }

  #ios-close {
    align-self: flex-end;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.78rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 0;
    margin-top: 0.2rem;
  }

  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    body {
      background: white !important;
      color: #111 !important;
      padding: 1cm 1.5cm;
      background-image: none !important;
    }

    header {
      border-bottom: 2px solid #333 !important;
      margin-bottom: 1.5rem;
    }

    header h1 {
      font-size: 2.8rem !important;
      background: none !important;
      -webkit-text-fill-color: #111 !important;
      color: #111 !important;
    }

    header p { color: #555 !important; }

    .progress-bar-wrap, .reset-btn { display: none !important; }

    .grid {
      display: none !important;
    }

    .print-columns {
      display: flex;
      gap: 1.2rem;
      align-items: flex-start;
    }

    .print-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .category {
      border: 1.5px solid #333 !important;
      background: white !important;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .cat-header {
      break-after: avoid;
      page-break-after: avoid;
    }

    .item {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .item:first-child {
      break-before: avoid;
      page-break-before: avoid;
    }

    .cat-header {
      background: #eeeeee !important;
      border-bottom: 1px solid #ccc !important;
      padding: 0.6rem 1rem;
    }

    .cat-icon { display: none; }

    .cat-title {
      color: #111 !important;
      font-size: 1rem !important;
    }

    .cat-count { color: #555 !important; }

    .items { padding: 0.4rem 0.75rem; gap: 0; }

    .item {
      padding: 0.35rem 0.5rem;
      gap: 0.6rem;
    }

    .item:hover { background: none !important; }

    .check-box {
      border: 1.5px solid #333 !important;
      background: white !important;
      border-radius: 3px;
    }

    .item.checked .check-box {
      background: #444 !important;
      border-color: #444 !important;
    }

    .item-label {
      color: #111 !important;
      font-size: 0.8rem !important;
    }

    .item.checked .item-label {
      color: #888 !important;
    }
  }
</style>
</head>
<body>

<header>
  <h1>❄ Wintersport Checklist</h1>
  <p>Vergeet niets op jouw wintersportvakantie</p>
  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span>Voortgang</span>
      <span id="progress-text">0 / 0</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>
</header>

<div class="grid" id="checklist"></div>

<button class="reset-btn" onclick="resetAll()">↺ Alles resetten</button>

<script>
const data = [
  {
    title: "Persoonlijke uitrusting",
    icon: "🧴",
    items: [
      "Zonnebrandcreme","Lippenbalsem","Toiletspullen",
      "Handdoeken","Nagelschaar en/of vijl","Zonnebril",
      "2 broeken","Schoenen","8 paar onderbroeken",
      "5 paar Sokken","2 Truien","Spelletjes"
    ]
  },
  {
    title: "Wintersportuitrusting",
    icon: "⛷️",
    items: [
      "Ski's","Snowboard","Ski schoenen","Snowboard schoenen",
      "Skibril","Ski rugzak","Skipully","Thermo ondergoed",
      "Skisokken","Skimuts","Ski zonnebril","Skihelm",
      "Skibroek","Ski jas","Snowboots","Ski handschoenen",
      "Ski stokken","Skiwax en gereedschap"
    ]
  },
  {
    title: "Auto uitrusting",
    icon: "🚗",
    items: [
      "EHBO kit","Veiligheidshesjes","Winterbanden",
      "Sneeuwkettingen","Ruitenwisservloeistof","Dakkoffer",
      "Gevarendriehoek","IJskrabber"
    ]
  },
  {
    title: "Documenten & Geld",
    icon: "📄",
    items: [
      "Bankpas (Pinnen in buitenland aanzetten)","Cash","Kentekenbewijs auto",
      "Reserveringsbewijzen","Verzekeringspapieren","Paspoorten of identiteitsbewijzen",
      "Rijbewijzen"
    ]
  },
  {
    title: "Handig voor in het appartement",
    icon: "🏠",
    items: [
      "Vuilniszakken","Voorraadje eten","Theedoeken","Keukenhanddoeken",
      "Kussens","Kurkentrekker","(Af)wasmiddelen","Afwasborstel",
      "Vaatdoeken","Plastic zakjes","Zout, peper & kruiden",
      "Suiker, thee & koffie","Koffiefilters of pads"
    ]
  },
  {
    title: "Elektronica",
    icon: "📱",
    items: [
      "Mobiele telefoon","Laptop/tablet","E-reader","Powerbank",
      "Geheugenkaartjes","Opladers","Camera + accu's"
    ]
  }
];

const STORAGE_KEY = 'wintersport-checklist-v1';
let state = {};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) state = JSON.parse(saved);
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) {}
}

function getKey(cat, item) {
  return `${cat}||${item}`;
}

function updateProgress() {
  let total = 0, checked = 0;
  data.forEach(cat => {
    cat.items.forEach(item => {
      total++;
      if (state[getKey(cat.title, item)]) checked++;
    });
  });
  document.getElementById('progress-text').textContent = `${checked} / ${total}`;
  document.getElementById('progress-fill').style.width = total ? `${(checked/total*100).toFixed(1)}%` : '0%';

  // Update cat counts
  data.forEach(cat => {
    const c = cat.items.filter(i => state[getKey(cat.title, i)]).length;
    const el = document.querySelector(`[data-cat="${cat.title}"] .cat-count`);
    if (el) el.textContent = `${c}/${cat.items.length}`;
  });
}

function toggle(cat, item) {
  const key = getKey(cat, item);
  state[key] = !state[key];
  saveState();
  const itemEl = document.querySelector(`[data-key="${CSS.escape(key)}"]`);
  if (itemEl) {
    itemEl.classList.toggle('checked', state[key]);
  }
  updateProgress();
  window.dispatchEvent(new Event('checkChanged'));
}

function resetAll() {
  if (!confirm('Weet je zeker dat je alle vinkjes wil verwijderen?')) return;
  state = {};
  saveState();
  document.querySelectorAll('.item.checked').forEach(el => el.classList.remove('checked'));
  updateProgress();
  window.dispatchEvent(new Event('checkChanged'));
}

function render() {
  const grid = document.getElementById('checklist');
  grid.innerHTML = '';
  data.forEach(cat => {
    const card = document.createElement('div');
    card.className = 'category';
    card.setAttribute('data-cat', cat.title);

    const checkedCount = cat.items.filter(i => state[getKey(cat.title, i)]).length;

    card.innerHTML = `
      <div class="cat-header">
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-title">${cat.title}</span>
        <span class="cat-count">${checkedCount}/${cat.items.length}</span>
      </div>
      <div class="items">
        ${cat.items.map(item => {
          const key = getKey(cat.title, item);
          const checked = state[key] ? 'checked' : '';
          return `<label class="item ${checked}" data-key="${key}" onclick="toggle('${cat.title.replace(/'/g,"\\'")}', '${item.replace(/'/g,"\\'")}'); return false;">
            <div class="check-box">
              <svg class="check-icon" viewBox="0 0 10 10" fill="none">
                <path d="M1.5 5L4 7.5L8.5 2.5" stroke="#0a0f1e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="item-label">${item}</span>
          </label>`;
        }).join('')}
      </div>
    `;
    grid.appendChild(card);
  });
  updateProgress();
}

loadState();
render();
buildPrintLayout();
registerSW();
setupInstallBanner();

function registerSW() {
  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'wintersport-v1';
      const FONTS = [
        'https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap'
      ];
      self.addEventListener('install', e => {
        e.waitUntil(caches.open(CACHE).then(c => c.addAll(FONTS).catch(()=>{})));
        self.skipWaiting();
      });
      self.addEventListener('fetch', e => {
        e.respondWith(
          caches.match(e.request).then(r => r || fetch(e.request).then(res => {
            const clone = res.clone();
            caches.open(CACHE).then(c => c.put(e.request, clone));
            return res;
          }).catch(() => caches.match(e.request)))
        );
      });
    `;
    const blob = new Blob([swCode], {type: 'application/javascript'});
    const url = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(()=>{});
  }
}

let deferredPrompt = null;
function setupInstallBanner() {
  const banner = document.getElementById('install-banner');
  const btn = document.getElementById('install-btn');
  const dismiss = document.getElementById('install-dismiss');

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    banner.style.display = 'flex';
  });

  if (btn) btn.addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      banner.style.display = 'none';
    }
  });

  if (dismiss) dismiss.addEventListener('click', () => {
    banner.style.display = 'none';
  });

  // iOS: show manual tip if standalone not yet
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  if (isIOS && !isStandalone) {
    document.getElementById('ios-tip').style.display = 'flex';
    document.getElementById('ios-close').addEventListener('click', () => {
      document.getElementById('ios-tip').style.display = 'none';
    });
  }
}

function buildPrintLayout() {
  // Build balanced 2-column print layout
  const cats = data;
  // Calculate total items per category to balance columns
  const totalItems = cats.reduce((s, c) => s + c.items.length + 2, 0); // +2 for header height
  const half = totalItems / 2;

  let col1 = [], col2 = [];
  let sum = 0;
  let switched = false;
  cats.forEach(cat => {
    const h = cat.items.length + 2;
    if (!switched && sum + h / 2 <= half) {
      col1.push(cat.title);
      sum += h;
    } else {
      switched = true;
      col2.push(cat.title);
    }
  });

  const wrap = document.createElement('div');
  wrap.className = 'print-columns';
  wrap.id = 'print-columns';

  [col1, col2].forEach(col => {
    const colDiv = document.createElement('div');
    colDiv.className = 'print-col';
    col.forEach(title => {
      const original = document.querySelector(`[data-cat="${title}"]`);
      if (original) colDiv.appendChild(original.cloneNode(true));
    });
    wrap.appendChild(colDiv);
  });

  document.body.appendChild(wrap);

  // Keep print-columns in sync when items are toggled
  window.addEventListener('checkChanged', () => {
    document.querySelectorAll('#print-columns .item').forEach(el => {
      const key = el.getAttribute('data-key');
      if (key) el.classList.toggle('checked', !!state[key]);
    });
    document.querySelectorAll('#print-columns [data-cat]').forEach(card => {
      const catTitle = card.getAttribute('data-cat');
      const catData = data.find(c => c.title === catTitle);
      if (!catData) return;
      const c = catData.items.filter(i => state[getKey(catTitle, i)]).length;
      const countEl = card.querySelector('.cat-count');
      if (countEl) countEl.textContent = `${c}/${catData.items.length}`;
    });
  });
}
</script>

<!-- Android install banner -->
<div id="install-banner">
  <span>❄ Voeg toe aan beginscherm voor offline gebruik</span>
  <button id="install-btn">Installeer</button>
  <button id="install-dismiss">✕</button>
</div>

<!-- iOS install tip -->
<div id="ios-tip">
  <p>Tik op <strong>Deel ⬆</strong> en kies <strong>"Zet op beginscherm"</strong> om de checklist als app te openen.</p>
  <button id="ios-close">Sluiten</button>
</div>

</body>
</html>
